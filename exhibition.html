    <button class="theme-btn" onclick="setTheme('light')"  id="btn-light">☀ <span data-he="בהיר" data-en="Light">בהיר</span></button>
    <button class="theme-btn" onclick="setTheme('system')" id="btn-system">⊙ <span data-he="מערכת" data-en="System">מערכת</span></button>
    <button class="theme-btn" onclick="setTheme('dark')"   id="btn-dark">● <span data-he="כהה" data-en="Dark">כהה</span></button>
    <div class="lang-toggle">
      <button class="lang-btn active" id="btn-he" onclick="setLang('he')">עב</button>

    </div>
    <nav>

        <li><a href="../index.html" data-he="בית" data-en="Home">בית</a></li>
        <li><a href="project-plan.html" data-he="תכנית הפרויקט" data-en="Project Plan">תכנית הפרויקט</a></li>

      </ul>
    </nav>
  </header>

  <!-- Page content -->
  <main>
    <section class="section">
      <div class="container">

        <p class="section-label">SECTION LABEL</p>
        <h1>כותרת הדף</h1>
        <hr class="rule-blue" />

        <!-- Content here -->

      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="site-footer__left" dir="rtl">
      דוד קסטיאל · תואר שני בעיצוב לסביבה טכנולוגית<br>
      מכון טכנולוגי חולון HIT · הגשה: 4 אוגוסט 2026
    </div>
    <div class="site-footer__right">t.Co. · v1.0 · 2026</div>
  </footer>

  <script>
    const root = document.documentElement;
    const mq   = window.matchMedia('(prefers-color-scheme: dark)');
    let current = localStorage.getItem('tco-theme') || 'system';
    function applyTheme(t) {
      root.setAttribute('data-theme', t);
      ['light','system','dark'].forEach(x =>
        document.getElementById('btn-' + x).classList.toggle('active', x === t)
      );
      current = t;
      localStorage.setItem('tco-theme', t);
    }
    function setTheme(t) { applyTheme(t); }
    mq.addEventListener('change', () => { if (current === 'system') applyTheme('system'); });
    applyTheme(current);
  </script>
</body>
</html>
