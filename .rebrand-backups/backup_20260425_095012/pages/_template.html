<!DOCTYPE html>
<html lang="he" dir="rtl" data-theme="system">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>t.Co. — [PAGE TITLE] — v1.0</title>

</head>
<body>

  <!-- Theme bar -->
  <div class="theme-bar">
    <span class="theme-bar__label">ערכת נושא</span>
    <button class="theme-btn" onclick="setTheme('light')"  id="btn-light">☀ בהיר</button>
    <button class="theme-btn" onclick="setTheme('system')" id="btn-system">⊙ מערכת</button>
    <button class="theme-btn" onclick="setTheme('dark')"   id="btn-dark">● כהה</button>
  </div>

  <!-- Header -->
  <header class="site-header">
    <div>
      <div class="site-logo">t.Co.</div>
      <div class="site-tagline">Personal AI Travel Concierge</div>
    </div>
    <nav>
            <ul class="site-nav">
        <li><a href="../index.html">בית</a></li>
        <li><a href="project-plan.html">תכנית הפרויקט</a></li>
        <li><a href="agents.html">ארכיטקטורה</a></li>
        <li><a href="design-system.html">Design System</a></li>
        <li><a href="exhibition.html">תערוכה</a></li>
      </ul>
    </nav>
  </header>

  <!-- Page content -->
  <main>
    <section class="section">
      <div class="container">

        <p class="section-label">SECTION LABEL</p>
        <h1>כותרת הדף</h1>
        <hr class="rule-blue" />

        <!-- Content here -->

      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="site-footer__left" dir="rtl">
      דוד קסטיאל · תואר שני בעיצוב לסביבה טכנולוגית<br>
      מכון טכנולוגי חולון HIT · הגשה: 4 אוגוסט 2026
    </div>
    <div class="site-footer__right">t.Co. · v1.0 · 2026</div>
  </footer>

  <script>
    const root = document.documentElement;
    const mq   = window.matchMedia('(prefers-color-scheme: dark)');
    let current = localStorage.getItem('tco-theme') || 'system';
    function applyTheme(t) {
      root.setAttribute('data-theme', t);
      ['light','system','dark'].forEach(x =>
        document.getElementById('btn-' + x).classList.toggle('active', x === t)
      );
      current = t;
      localStorage.setItem('tco-theme', t);
    }
    function setTheme(t) { applyTheme(t); }
    mq.addEventListener('change', () => { if (current === 'system') applyTheme('system'); });
    applyTheme(current);
  </script>
</body>
</html>
